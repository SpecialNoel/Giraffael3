<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="title">Sign up</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <h1>This is a sign-up page</h1>
    
    <!-- Sign-up section -->
    <form id="sign-up-form">
      <label for="email"> Email: </label>
      <input
        id="email"
        type="email"
        placeholder="Enter your email"
        required
      />
      <label for="plainPassword"> Password: </label>
      <input
        id="plainPassword"
        type="password"
        placeholder="Enter your password"
        maxlength="16"
        required
      />
      <button type="submit">Sign up</button>
    </form>

    <a href="/signin">Go to Sign-In</a>

    <!-- Handle user side sign-up services -->
    <script type="module" src="/pages/sign-up-page.js"></script>
  </body>
</html>
