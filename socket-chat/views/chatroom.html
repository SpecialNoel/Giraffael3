<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="title">Chatroom</title>
  </head>

  <body>
    <!-- Chat room section -->
    <section id="chat-section">
      <!-- Chat room header section -->
      <div id="chat-header-section">
        <!-- Room information -->
        <label id="roomCodeInChat">Room code</label>

        <!-- User information -->
        <label id="usernameInChat">Username</label>
      </div>

      <!-- Chat list -->
      <div>
        <label>Message history: </label>
        <ul id="messages"></ul>
      </div>

      <!-- Current online users -->
      <div>
        <label>Online User:</label>
        <ul id="onlineUsers"></ul>
      </div>

      <!-- Input and send message -->
      <label>Send Message: </label>
      <div>
        <form id="form" action="">
          <input id="input" autocomplete="off" /> <button>Send</button>
        </form>
      </div>
    </section>
  </body>
</html>
